<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS</title>
    <style>
        body { 
            background-color: #050b14; 
            color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 {
            font-size: 2rem;
            margin-top: 30px;
            text-shadow: 0 0 10px #00ffcc;
        }
        .arc-reactor { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: 5px solid #00ffcc; 
            margin: 50px auto; 
            box-shadow: 0 0 25px #00ffcc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .arc-reactor:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px #00ffcc;
        }
        .arc-reactor.listening { 
            animation: pulse 1s infinite; 
            border-color: #ff0055; 
            box-shadow: 0 0 25px #ff0055; 
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
            100% { transform: scale(1); } 
        }
        #status { 
            font-size: 1.2rem; 
            margin-top: 20px; 
            text-shadow: 0 0 10px #00ffcc; 
            font-weight: bold;
        }
        #response { 
            color: #ffffff; 
            margin-top: 30px; 
            font-size: 1.2rem; 
            padding: 15px; 
            background: rgba(0, 255, 255, 0.05);
            border-radius: 8px;
            display: inline-block;
            max-width: 80%;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <h1>J.A.R.V.I.S. SYSTEM</h1>
    <p style="color: #88a0b0;">Konuşmak için Ark Reaktörüne Dokunun</p>
    
    <div id="reactor" class="arc-reactor" onclick="startListening()">
        <div style="font-size: 14px; font-weight: bold; letter-spacing: 2px;">JARVIS</div>
    </div>
    
    <div id="status">Sistem Çevrimiçi...</div>
    <div id="response">Sizi dinlemeye hazırım efendim.</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Tarayıcınız ses tanımayı desteklemiyor. Lütfen tabletinizde güncel Chrome veya Safari kullanın.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.interimResults = false;

        function startListening() {
            const reactor = document.getElementById('reactor');
            const status = document.getElementById('status');
            
            reactor.classList.add('listening');
            status.innerText = "Dinleniyor, efendim...";
            recognition.start();
        }

        recognition.onresult = async function(event) {
            const reactor = document.getElementById('reactor');
            const status = document.getElementById('status');
            const responseDiv = document.getElementById('response');
            
            const text = event.results[0][0].transcript;
            status.innerText = "Anlaşılıyor...";
            reactor.classList.remove('listening');
            responseDiv.innerText = "Siz: " + text;

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await res.json();
                responseDiv.innerText = "Jarvis: " + data.reply;
                status.innerText = "Cevap veriliyor...";

                let audio = new Audio('/speech?text=' + encodeURIComponent(data.reply));
                audio.play();
                audio.onended = () => { status.innerText = "Sistem Çevrimiçi..."; };
            } catch (error) {
                status.innerText = "Sistem Çevrimiçi...";
                responseDiv.innerText = "Bir hata oluştu efendim. Bağlantınızı kontrol edin.";
            }
        };

        recognition.onerror = function() {
            document.getElementById('reactor').classList.remove('listening');
            document.getElementById('status').innerText = "Hata oluştu. Tekrar deneyin.";
        };
    </script>
</body>
</html>
